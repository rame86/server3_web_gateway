# .github/workflows/ci-cd.yml
name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  # Node 24 강제 적용으로 경고 해결
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Node.js 22(LTS) 및 pnpm 설정 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.4.1 --activate

      # 2. React 빌드 
      - name: Install and Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      # 3. 배포 패키징 (빌드된 dist 폴더만 압축) 
      - name: Package Frontend
        run: |
          mkdir -p deploy
          cp -r dist/* deploy/
          cd deploy
          tar -czf frontend.tar.gz ./*

      # 4. GCP 전송 
      - name: Copy to GCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          source: "deploy/frontend.tar.gz"
          target: "/home/${{ secrets.GCP_USER }}/nginx/frontend/"
          strip_components: 1

      # 5. 압축 해제 및 서비스 갱신 
      - name: Extract and Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            cd ~/nginx/frontend
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            
            # 게이트웨이 컨테이너만 재시작하여 변경된 정적 파일 적용
            cd ~/nginx
            docker compose restart nginx-gateway