name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package for Docker Build
        run: |
          mkdir -p deploy
          # 누락되는 설정 파일이 없도록 node_modules, .git을 제외하고 전체 압축
          tar --exclude='./node_modules' --exclude='./.git' --exclude='./deploy' -czf deploy/frontend.tar.gz .

      - name: Copy to GCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          source: "deploy/frontend.tar.gz"
          target: "/home/${{ secrets.GCP_USER }}/frontend/"
          strip_components: 1

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            cd /home/${{ secrets.GCP_USER }}/frontend
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            
            docker compose up -d --build
            docker image prune -f
            docker restart nginx-gateway