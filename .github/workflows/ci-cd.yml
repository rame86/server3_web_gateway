# /web/ .github/workflows/ci-cd.yml
name: Frontend CI/CD Pipeline

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Package for Docker Build
        run: |
          mkdir -p deploy
          cp -r client deploy/client
          cp -r patches deploy/patches
          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp vite.config.js deploy/
          cp nginx.conf deploy/
          cp client/Dockerfile deploy/
          cd deploy && tar -czf frontend.tar.gz client/ patches/ package.json pnpm-lock.yaml vite.config.js nginx.conf Dockerfile

      - name: Copy to GCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          source: "deploy/frontend.tar.gz"
          target: "/home/${{ secrets.GCP_USER }}/frontend/"
          strip_components: 1

      - name: Build Container and Refresh Gateway
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            cd /home/${{ secrets.GCP_USER }}/frontend
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            
            # 1. 프론트엔드 컨테이너 빌드 및 재실행
            docker build -t lumina-frontend .
            docker rm -f frontend || true
            docker run -d --name frontend --network msa-network lumina-frontend
            
            # 2. 게이트웨이 재시작 (연결 갱신)
            docker restart nginx-gateway