# /web/ .github/workflows/ci-cd.yml
name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  # Node 24 엔진 강제 적용으로 경고 제거
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Node.js 및 pnpm 설정
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 최신 LTS 권장

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.4.1 --activate

      # 2. React 프로젝트 빌드 (락파일 불일치 무시 옵션 추가)
      - name: Install and Build
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      # 3. 배포 패키징 (오직 dist 폴더만 패키징)
      - name: Package Frontend Files
        run: |
          mkdir -p deploy/dist
          cp -r dist/* deploy/dist/
          cd deploy
          tar -czf frontend.tar.gz ./dist

      # 4. GCP 서버로 전송 (전송 위치: ~/nginx/frontend/)
      - name: Copy Files to GCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          source: "deploy/frontend.tar.gz"
          target: "/home/${{ secrets.GCP_USER }}/nginx/frontend/"
          strip_components: 1 # deploy 폴더 제외하고 내부 파일만 전송

      # 5. GCP 서버에서 압축 해제
      - name: Extract and Refresh
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          script: |
            WORK_DIR="/home/${{ secrets.GCP_USER }}/nginx/frontend"
            cd $WORK_DIR
            
            # 기존 dist 폴더가 있다면 삭제 후 새로 압축 해제
            rm -rf dist
            tar -xzf frontend.tar.gz
            rm frontend.tar.gz
            
            # Nginx(nobody)가 파일을 읽을 수 있도록 권한 강제 부여
            chmod -R 755 dist
            
            # 컨테이너 재시작
            docker restart nginx-gateway